name: Apply audited ShellCheck fixes

on:
  push:
    branches: [fix/audit-shell-parser]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/audit-shell-parser
      - name: Apply and validate patch
        shell: bash
        run: |
          printf '%s' '' | base64 -d > /tmp/audit.patch
          git apply --check /tmp/audit.patch
          git apply /tmp/audit.patch
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          while IFS= read -r -d '' file; do bash -n "$file"; done < <(find src -type f -name '*.sh' -print0)
          mapfile -d '' files < <(find src -type f -name '*.sh' -print0)
          shellcheck -x "${files[@]}"
      - name: Commit validated fixes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src
          git rm .github/workflows/apply-shellcheck-fixes.yml
          git commit -m "fix: resolve recursive ShellCheck findings"
          git push origin HEAD:${GITHUB_REF_NAME}
